databaseChangeLog:
  - changeSet:
      id: 001-create-employee-profiles
      author: viktorria_shevchenko
      changes:
        - createTable:
            tableName: employee_profiles
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
                    foreignKeyName: fk_employee_profile_user
                    references: users(id)
                    unique: true
              - column:
                  name: specialization
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: TEXT
              - column:
                  name: experience_years
                  type: INT
                  defaultValue: 0
              - column:
                  name: is_active
                  type: BOOLEAN
                  defaultValue: true
              - column:
                  name: created_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMP
                  constraints:
                    nullable: false
        - createIndex:
            tableName: employee_profiles
            indexName: idx_employee_profiles_is_active
            columns:
              - column:
                  name: is_active